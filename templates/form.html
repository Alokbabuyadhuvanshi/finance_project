{% extends 'base.html' %}
{% block content %}
<h3>Add / Update Record</h3>

{% if form.errors %}
    <p style="color:red;">Invalid input. Please correct the errors below.</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>
{% endblock %}
